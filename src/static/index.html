<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="auth-toolbar">
        <button id="user-menu-btn" class="icon-button" type="button" aria-label="User menu">👤</button>
        <div id="auth-menu" class="auth-menu hidden">
          <button id="login-btn" type="button">Teacher Login</button>
          <button id="logout-btn" class="hidden" type="button">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="auth-status" class="auth-status">Viewing as student</p>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <p id="admin-note" class="info-note">Teachers must log in to register or unregister students.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="teacher-username">Username:</label>
            <input type="text" id="teacher-username" required placeholder="e.g. mrs.johnson" />
          </div>
          <div class="form-group">
            <label for="teacher-password">Password:</label>
            <input type="password" id="teacher-password" required />
          </div>
          <div class="modal-actions">
            <button type="submit">Log In</button>
            <button id="cancel-login-btn" type="button" class="secondary">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
